apiVersion: apps/v1
kind: Deployment
metadata:
  name: flatcar-linux-update-operator
  namespace: reboot-coordinator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flatcar-linux-update-operator
  template:
    metadata:
      labels:
        app: flatcar-linux-update-operator
    spec:
      serviceAccountName: flatcar-linux-update-operator-sa
      containers:
        - name: update-operator
          image: ghcr.io/flatcar/flatcar-linux-update-operator:v0.9.0@sha256:67a2c3c23dd94b9e56aeb87b41d7d2176fea681861fb70b015c7ca8b18165cdd
          command:
            - "/bin/update-operator"
            - "--reboot-window-start=03:00"
            - "--reboot-window-length=2h"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
